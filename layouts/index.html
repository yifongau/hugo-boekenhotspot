{{- $books := partial "books-data.html" . -}}

<!DOCTYPE html>
<html lang="nl">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	{{ $style := resources.Get "style.css" | fingerprint }}
	<link rel="stylesheet" type="text/css" href="{{ $style.RelPermalink }}">

	{{ $script := resources.Get "main.js" | js.Build | fingerprint }}
	<script src="{{ $script.RelPermalink }}" type="module"></script>

	<script type="application/json" id="books-data">
  	{{ $books }}
	</script>

	<title>{{ .Site.Title }}</title>
</head>


<body>

	<header class="page-header">
		<div class="search-row">
			<div class="search-box">
				<input type="text" placeholder="Doorzoek bibliotheek..." class="search-input" />
				<button class="shuffle-btn" title="Shuffle" aria-label="Shuffle boeken">
					<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-hidden="true">
						<rect x="8" y="8" width="84" height="84" rx="18" class="die-face" />
						<circle cx="30" cy="30" r="8" class="die-pip" />
						<circle cx="70" cy="30" r="8" class="die-pip" />
						<circle cx="50" cy="50" r="8" class="die-pip" />
						<circle cx="30" cy="70" r="8" class="die-pip" />
						<circle cx="70" cy="70" r="8" class="die-pip" />
					</svg>
				</button>
			</div>

	</header>

	<main>
		{{/* Load $books into attribute */}}
		<div id="books-grid"></div>
		<div id="book-modal" class="modal" hidden>
			<div class="modal-content">
				<img id="modal-image" class="modal-image" src="" alt="Boekomslag" />
				<!-- ...details... -->
			</div>
		</div>
	</main>



</body>

</html>
